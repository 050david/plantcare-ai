<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantCare AI – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-leaf-fill text-success fs-4"></i>
        <span>PlantCare <span class="text-success">AI</span></span>
      </a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <h4 class="fw-bold mb-1">Welcome back</h4>
          <p class="text-muted small mb-4">Sign in to your PlantCare AI account</p>

          <div id="errorMsg" class="alert alert-danger d-none"></div>

          <div class="mb-3">
            <label class="form-label small fw-medium">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" />
          </div>

          <div class="mb-4">
            <label class="form-label small fw-medium">Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" />
          </div>

          <button class="btn btn-success w-100" id="loginBtn">
            <span id="loginText">Sign In</span>
            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
          </button>

          <p class="text-center text-muted small mt-3 mb-0">
            Don't have an account? <a href="register.html" class="text-success">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const loginBtn = document.getElementById('loginBtn');
      const loginSpinner = document.getElementById('loginSpinner');
      const loginText = document.getElementById('loginText');

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.classList.remove('d-none');
        return;
      }

      loginBtn.disabled = true;
      loginSpinner.classList.remove('d-none');
      loginText.textContent = 'Signing in...';
      errorMsg.classList.add('d-none');

      const result = await login(email, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = result.error;
        errorMsg.classList.remove('d-none');
        loginBtn.disabled = false;
        loginSpinner.classList.add('d-none');
        loginText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
