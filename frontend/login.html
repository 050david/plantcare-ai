<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantCare AI – Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <i class="bi bi-leaf-fill" style="color:var(--green-mid);"></i>
        <span>PlantCare <span style="color:var(--green-mid);">AI</span></span>
      </a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4 fade-up">

        <div class="text-center mb-4">
          <div class="mb-3" style="width:56px;height:56px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto;">
            <i class="bi bi-leaf-fill" style="color:var(--green-deep);font-size:1.4rem;"></i>
          </div>
          <h4 class="fw-bold mb-1" style="font-family:'Playfair Display',serif;">Welcome back</h4>
          <p style="color:var(--muted);font-size:0.88rem;">Sign in to your PlantCare AI account</p>
        </div>

        <div class="card p-4">
          <div id="errorMsg" class="alert alert-danger d-none mb-3"></div>

          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" />
          </div>

          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" />
          </div>

          <button class="btn btn-success w-100" id="loginBtn">
            <span id="loginText">Sign In</span>
            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
          </button>

          <p class="text-center mt-3 mb-0" style="font-size:0.85rem; color:var(--muted);">
            Don't have an account? <a href="register.html" style="color:var(--green-deep); font-weight:600; text-decoration:none;">Create one</a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const loginBtn = document.getElementById('loginBtn');
      const loginSpinner = document.getElementById('loginSpinner');
      const loginText = document.getElementById('loginText');

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.classList.remove('d-none');
        return;
      }

      loginBtn.disabled = true;
      loginSpinner.classList.remove('d-none');
      loginText.textContent = 'Signing in...';
      errorMsg.classList.add('d-none');

      const result = await login(email, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = result.error;
        errorMsg.classList.remove('d-none');
        loginBtn.disabled = false;
        loginSpinner.classList.add('d-none');
        loginText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
