<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantCare AI – Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-leaf-fill text-success fs-4"></i>
        <span>PlantCare <span class="text-success">AI</span></span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="index.html" class="text-white text-decoration-none small">
          <i class="bi bi-cpu me-1"></i>Analyze
        </a>
        <div class="dropdown">
          <button class="btn btn-outline-success btn-sm dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-person me-1"></i><span id="navUsername"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="mb-5">
      <h4 class="fw-bold mb-1">Admin Dashboard</h4>
      <p class="text-muted small mb-0">Overview of all users and scans</p>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-5" id="statsRow">
      <div class="col-md-3">
        <div class="card text-center p-3">
          <div class="fs-2 fw-bold text-success" id="totalUsers">—</div>
          <div class="text-muted small">Total Users</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center p-3">
          <div class="fs-2 fw-bold text-success" id="totalScans">—</div>
          <div class="text-muted small">Total Scans</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center p-3">
          <div class="fs-2 fw-bold text-success" id="healthyScans">—</div>
          <div class="text-muted small">Healthy Plants</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center p-3">
          <div class="fs-2 fw-bold text-warning" id="diseaseScans">—</div>
          <div class="text-muted small">Disease Detected</div>
        </div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="card mb-4">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4"><i class="bi bi-people me-2 text-success"></i>Registered Users</h5>
        <div id="usersLoading" class="text-center py-3">
          <div class="spinner-border spinner-border-sm text-success"></div>
        </div>
        <div class="table-responsive d-none" id="usersTable">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Scans</th>
                <th>Joined</th>
                <th>Role</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Recent Scans Table -->
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4"><i class="bi bi-clock-history me-2 text-success"></i>Recent Scans</h5>
        <div id="scansLoading" class="text-center py-3">
          <div class="spinner-border spinner-border-sm text-success"></div>
        </div>
        <div class="table-responsive d-none" id="scansTable">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>#</th>
                <th>Plant</th>
                <th>Condition</th>
                <th>Status</th>
                <th>Confidence</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="scansBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (user) {
      document.getElementById('navUsername').textContent = user.full_name.split(' ')[0];
      if (!user.is_admin) window.location.href = 'index.html';
    }

    async function loadAdmin() {
      const headers = { 'Authorization': `Bearer ${getToken()}` };

      // Load users
      const usersRes = await fetch(`${API_URL}/admin/users`, { headers });
      if (usersRes.status === 401 || usersRes.status === 403) {
        window.location.href = 'index.html';
        return;
      }
      const users = await usersRes.json();

      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('usersLoading').classList.add('d-none');
      document.getElementById('usersTable').classList.remove('d-none');

      document.getElementById('usersBody').innerHTML = users.map((u, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${u.full_name}</td>
          <td>${u.email}</td>
          <td>${u.scan_count}</td>
          <td>${new Date(u.created_at).toLocaleDateString()}</td>
          <td><span class="badge ${u.is_admin ? 'bg-danger' : 'bg-secondary'}">${u.is_admin ? 'Admin' : 'User'}</span></td>
        </tr>
      `).join('');

      // Load scans
      const scansRes = await fetch(`${API_URL}/admin/scans`, { headers });
      const scans = await scansRes.json();

      document.getElementById('totalScans').textContent = scans.length;
      const healthy = scans.filter(s => s.is_healthy).length;
      document.getElementById('healthyScans').textContent = healthy;
      document.getElementById('diseaseScans').textContent = scans.length - healthy;

      document.getElementById('scansLoading').classList.add('d-none');
      document.getElementById('scansTable').classList.remove('d-none');

      document.getElementById('scansBody').innerHTML = scans.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${s.plant}</td>
          <td>${s.disease}</td>
          <td><span class="badge ${s.is_healthy ? 'bg-success' : 'bg-warning text-dark'}">${s.is_healthy ? 'Healthy' : 'Disease'}</span></td>
          <td>${s.confidence}%</td>
          <td>${new Date(s.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
    }

    loadAdmin();
  </script>
</body>
</html>
