<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantCare AI – Scan History</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-leaf-fill text-success fs-4"></i>
        <span>PlantCare <span class="text-success">AI</span></span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="index.html" class="text-white text-decoration-none small">
          <i class="bi bi-cpu me-1"></i>Analyze
        </a>
        <div class="dropdown">
          <button class="btn btn-outline-success btn-sm dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-person me-1"></i><span id="navUsername"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="fw-bold mb-1">Scan History</h4>
        <p class="text-muted small mb-0">All your previous plant analyses</p>
      </div>
      <a href="index.html" class="btn btn-success btn-sm">
        <i class="bi bi-plus me-1"></i>New Scan
      </a>
    </div>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-success" role="status"></div>
      <p class="text-muted mt-3">Loading history...</p>
    </div>

    <div id="emptyState" class="text-center py-5 d-none">
      <i class="bi bi-clock-history text-muted fs-1 mb-3 d-block"></i>
      <p class="text-muted">No scans yet. Go analyze a plant!</p>
      <a href="index.html" class="btn btn-success btn-sm">Analyze Now</a>
    </div>

    <div id="historyList" class="row g-3 d-none"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (user) document.getElementById('navUsername').textContent = user.full_name.split(' ')[0];

    async function loadHistory() {
      try {
        const response = await fetch(`${API_URL}/history`, {
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });

        if (response.status === 401) { logout(); return; }
        const scans = await response.json();

        document.getElementById('loadingState').classList.add('d-none');

        if (scans.length === 0) {
          document.getElementById('emptyState').classList.remove('d-none');
          return;
        }

        const list = document.getElementById('historyList');
        list.classList.remove('d-none');

        list.innerHTML = scans.map(scan => `
          <div class="col-md-6 col-lg-4">
            <div class="card h-100">
              <div class="card-body p-3">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <span class="badge ${scan.is_healthy ? 'bg-success' : 'bg-warning text-dark'}">
                    ${scan.is_healthy ? '✅ Healthy' : '⚠️ Disease'}
                  </span>
                  <small class="text-muted">${new Date(scan.created_at).toLocaleDateString()}</small>
                </div>
                <h6 class="fw-bold mb-1">${scan.plant}</h6>
                <p class="text-muted small mb-2">${scan.disease}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <small class="text-muted">Confidence</small>
                  <small class="fw-bold text-success">${scan.confidence}%</small>
                </div>
                <div class="progress mt-1" style="height: 4px;">
                  <div class="progress-bar bg-success" style="width: ${scan.confidence}%"></div>
                </div>
              </div>
            </div>
          </div>
        `).join('');

      } catch (err) {
        document.getElementById('loadingState').classList.add('d-none');
        document.getElementById('emptyState').classList.remove('d-none');
      }
    }

    loadHistory();
  </script>
</body>
</html>
