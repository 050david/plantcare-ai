<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantCare AI – Scan History</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-leaf-fill" style="color:var(--green-mid);"></i>
        <span>PlantCare <span style="color:var(--green-mid);">AI</span></span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="index.html" class="text-white text-decoration-none small">
          <i class="bi bi-cpu me-1"></i>Analyze
        </a>
        <div class="dropdown">
          <button class="btn btn-outline-success btn-sm dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-person me-1"></i><span id="navUsername"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 fade-up">
      <div>
        <p class="mb-1" style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;">Your Activity</p>
        <h4 class="fw-bold mb-0" style="font-family:'Playfair Display',serif;">Scan History</h4>
      </div>
      <a href="index.html" class="btn btn-success btn-sm">
        <i class="bi bi-plus me-1"></i>New Scan
      </a>
    </div>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border" style="color:var(--green-mid);" role="status"></div>
      <p class="mt-3" style="color:var(--muted);font-size:0.88rem;">Loading history...</p>
    </div>

    <div id="emptyState" class="text-center py-5 d-none fade-up">
      <div class="mb-3" style="width:64px;height:64px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto;">
        <i class="bi bi-clock-history" style="color:var(--green-deep);font-size:1.5rem;"></i>
      </div>
      <p class="fw-medium mb-1">No scans yet</p>
      <p style="color:var(--muted);font-size:0.85rem;">Your scan history will appear here after your first analysis.</p>
      <a href="index.html" class="btn btn-success btn-sm mt-2">Analyze a Plant</a>
    </div>

    <div id="historyList" class="row g-3 d-none"></div>
  </div>

  <footer class="text-center py-4">
    <p class="mb-0">PlantCare AI &mdash; Built for farmers, gardeners, and researchers</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (user) document.getElementById('navUsername').textContent = user.full_name.split(' ')[0];

    async function loadHistory() {
      try {
        const response = await fetch(`${API_URL}/history`, {
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });

        if (response.status === 401) { logout(); return; }
        const scans = await response.json();

        document.getElementById('loadingState').classList.add('d-none');

        if (scans.length === 0) {
          document.getElementById('emptyState').classList.remove('d-none');
          return;
        }

        const list = document.getElementById('historyList');
        list.classList.remove('d-none');

        list.innerHTML = scans.map((scan, i) => `
          <div class="col-md-6 col-lg-4 fade-up" style="animation-delay:${i * 0.05}s;">
            <div class="history-card p-3">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <span class="badge ${scan.is_healthy ? 'bg-success' : 'bg-warning'}">
                  ${scan.is_healthy ? '✓ Healthy' : '⚠ Disease'}
                </span>
                <small style="color:var(--muted);font-size:0.75rem;">${new Date(scan.created_at).toLocaleDateString('en-GB')}</small>
              </div>
              <p class="fw-bold mb-0" style="font-size:0.95rem;">${scan.plant}</p>
              <p style="color:var(--muted);font-size:0.82rem;margin-bottom:0.75rem;">${scan.disease}</p>
              <div class="d-flex justify-content-between align-items-center mb-1">
                <small style="color:var(--muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.5px;">Confidence</small>
                <small class="fw-bold" style="font-size:0.78rem;color:var(--green-deep);">${scan.confidence}%</small>
              </div>
              <div class="progress" style="height:4px;">
                <div class="progress-bar" style="width:${scan.confidence}%"></div>
              </div>
            </div>
          </div>
        `).join('');

      } catch (err) {
        document.getElementById('loadingState').classList.add('d-none');
        document.getElementById('emptyState').classList.remove('d-none');
      }
    }

    loadHistory();
  </script>
</body>
</html>
