<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantCare AI – Create Account</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <i class="bi bi-leaf-fill" style="color:var(--green-mid);"></i>
        <span>PlantCare <span style="color:var(--green-mid);">AI</span></span>
      </a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4 fade-up">

        <div class="text-center mb-4">
          <div class="mb-3" style="width:56px;height:56px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto;">
            <i class="bi bi-person-plus-fill" style="color:var(--green-deep);font-size:1.3rem;"></i>
          </div>
          <h4 class="fw-bold mb-1" style="font-family:'Playfair Display',serif;">Create an account</h4>
          <p style="color:var(--muted);font-size:0.88rem;">Join PlantCare AI and start monitoring your plants</p>
        </div>

        <div class="card p-4">
          <div id="errorMsg" class="alert alert-danger d-none mb-3"></div>

          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" placeholder="John Doe" />
          </div>

          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" />
          </div>

          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" />
          </div>

          <button class="btn btn-success w-100" id="registerBtn">
            <span id="registerText">Create Account</span>
            <span id="registerSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
          </button>

          <p class="text-center mt-3 mb-0" style="font-size:0.85rem; color:var(--muted);">
            Already have an account? <a href="login.html" style="color:var(--green-deep); font-weight:600; text-decoration:none;">Sign in</a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const registerBtn = document.getElementById('registerBtn');
      const registerSpinner = document.getElementById('registerSpinner');
      const registerText = document.getElementById('registerText');

      if (!fullName || !email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.classList.remove('d-none');
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.classList.remove('d-none');
        return;
      }

      registerBtn.disabled = true;
      registerSpinner.classList.remove('d-none');
      registerText.textContent = 'Creating account...';
      errorMsg.classList.add('d-none');

      const result = await register(fullName, email, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = result.error;
        errorMsg.classList.remove('d-none');
        registerBtn.disabled = false;
        registerSpinner.classList.add('d-none');
        registerText.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
